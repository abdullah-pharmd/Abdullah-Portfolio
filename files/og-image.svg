<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c6fff"/>
      <stop offset="100%" stop-color="#e879f9"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05050d"/>
      <stop offset="100%" stop-color="#0d0d18"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#7c6fff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7c6fff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#e879f9" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#e879f9" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Top accent line -->
  <rect x="80" y="80" width="120" height="3" rx="2" fill="url(#accent)"/>

  <!-- Label -->
  <text x="80" y="145" font-family="Inter,system-ui,sans-serif" font-size="18" font-weight="600" letter-spacing="4" fill="#7c6fff" opacity="0.9">AI AUTOMATION BUILDER</text>

  <!-- Name -->
  <text x="80" y="230" font-family="Inter,system-ui,sans-serif" font-size="72" font-weight="900" letter-spacing="-2" fill="white">Muhammad Abdullah</text>
  <text x="80" y="315" font-family="Inter,system-ui,sans-serif" font-size="72" font-weight="900" letter-spacing="-2" fill="url(#accent)">Khan</text>

  <!-- Tagline -->
  <text x="80" y="390" font-family="Inter,system-ui,sans-serif" font-size="26" font-weight="400" fill="#777799">I fix what's silently costing you.</text>

  <!-- Divider -->
  <rect x="80" y="430" width="1040" height="1" fill="#1e1e30"/>

  <!-- Pills row -->
  <!-- Lead Automation pill -->
  <rect x="80" y="460" width="190" height="38" rx="8" fill="#1a1a2e" stroke="#7c6fff" stroke-width="1" stroke-opacity="0.4"/>
  <text x="175" y="484" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="600" fill="#b39dff" text-anchor="middle">Lead Automation</text>

  <!-- Voice AI pill -->
  <rect x="286" y="460" width="120" height="38" rx="8" fill="#1a1a2e" stroke="#7c6fff" stroke-width="1" stroke-opacity="0.4"/>
  <text x="346" y="484" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="600" fill="#b39dff" text-anchor="middle">Voice AI</text>

  <!-- RAG pill -->
  <rect x="422" y="460" width="160" height="38" rx="8" fill="#1a1a2e" stroke="#7c6fff" stroke-width="1" stroke-opacity="0.4"/>
  <text x="502" y="484" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="600" fill="#b39dff" text-anchor="middle">RAG Systems</text>

  <!-- n8n pill -->
  <rect x="598" y="460" width="80" height="38" rx="8" fill="#1a1a2e" stroke="#7c6fff" stroke-width="1" stroke-opacity="0.4"/>
  <text x="638" y="484" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="600" fill="#b39dff" text-anchor="middle">n8n</text>

  <!-- PharmD pill -->
  <rect x="694" y="460" width="100" height="38" rx="8" fill="#1a1a2e" stroke="#e879f9" stroke-width="1" stroke-opacity="0.4"/>
  <text x="744" y="484" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="600" fill="#e879f9" text-anchor="middle">PharmD</text>

  <!-- URL -->
  <text x="1120" y="484" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="500" fill="#555577" text-anchor="end">abdullahautomations.vercel.app</text>

  <!-- Corner accent dots -->
  <circle cx="1140" cy="90" r="4" fill="#7c6fff" opacity="0.5"/>
  <circle cx="1160" cy="90" r="4" fill="#e879f9" opacity="0.5"/>
  <circle cx="1150" cy="108" r="4" fill="#7c6fff" opacity="0.3"/>
</svg>
